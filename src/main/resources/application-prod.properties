# =============================================================================
# Personal Finance Tracker - Production Configuration
# Activated via: --spring.profiles.active=prod
# =============================================================================

# Application Name
spring.application.name=personal-finance-tracker

# MySQL Database Configuration (AWS RDS)
spring.datasource.url=jdbc:mysql://finance-tracker-db.c1xyz.us-east-1.rds.amazonaws.com:3306/personal_finance_tracker?useSSL=true&serverTimezone=UTC
spring.datasource.username=admin
spring.datasource.password=FinanceDB2024!
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool (HikariCP) - Production Tuning
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false

# Server Configuration
server.port=8080

# JWT Configuration
app.jwt.secret=YourProductionSecretKeyMustBeAtLeast256BitsLongChangeThisInProduction2024
app.jwt.expiration=86400000

# Swagger / OpenAPI Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Logging - Production level
logging.level.com.personalfinance.tracker=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# Actuator (health checks for monitoring)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
