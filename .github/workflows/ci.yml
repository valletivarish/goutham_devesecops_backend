name: Backend CI - Build & Security Scan

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-and-test:
    name: Build, Test & Security Analysis
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------------
      # 1. Checkout
      # ------------------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 2. Setup Java 17
      # ------------------------------------------------------------------
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # ------------------------------------------------------------------
      # 3. Maven Build & Unit Tests
      # ------------------------------------------------------------------
      - name: Build with Maven
        run: mvn clean compile -B

      - name: Run Unit Tests
        run: mvn test -B

      # ------------------------------------------------------------------
      # 4. JaCoCo Code Coverage Report
      # ------------------------------------------------------------------
      - name: Generate JaCoCo Coverage Report
        run: mvn verify -B -DskipTests

      - name: Upload JaCoCo Report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 30

      # ------------------------------------------------------------------
      # 5. SpotBugs + FindSecBugs Static Analysis
      # ------------------------------------------------------------------
      - name: Run SpotBugs Analysis
        run: mvn spotbugs:check -B || true

      - name: Upload SpotBugs Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: spotbugs-report
          path: target/spotbugsXml.xml
          retention-days: 30

      # ------------------------------------------------------------------
      # 6. PMD Static Analysis
      # ------------------------------------------------------------------
      - name: Run PMD Analysis
        run: mvn pmd:check -B || true

      - name: Upload PMD Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pmd-report
          path: target/pmd.xml
          retention-days: 30

      # ------------------------------------------------------------------
      # 7. OWASP Dependency-Check
      # ------------------------------------------------------------------
      - name: Run OWASP Dependency-Check
        run: mvn org.owasp:dependency-check-maven:check -B -DfailBuildOnCVSS=11 || true

      - name: Upload OWASP Dependency-Check Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-dependency-check-report
          path: target/dependency-check-report.*
          retention-days: 30

      # ------------------------------------------------------------------
      # 8. Trivy Vulnerability Scan & SBOM
      # ------------------------------------------------------------------
      - name: Package JAR for Trivy scan
        run: mvn package -B -DskipTests

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          output: 'trivy-results.txt'
          severity: 'CRITICAL,HIGH,MEDIUM'

      - name: Generate Trivy SBOM
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'cyclonedx'
          output: 'trivy-sbom.json'

      - name: Upload Trivy Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-reports
          path: |
            trivy-results.txt
            trivy-sbom.json
          retention-days: 30

      # ------------------------------------------------------------------
      # 9. Gitleaks Secret Detection
      # ------------------------------------------------------------------
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        continue-on-error: true

      - name: Upload Gitleaks Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gitleaks-report
          path: results.sarif
          retention-days: 30

      # ------------------------------------------------------------------
      # 10. Build Final JAR Artifact
      # ------------------------------------------------------------------
      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 30
