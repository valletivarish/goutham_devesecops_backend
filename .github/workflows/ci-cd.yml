name: Backend CI/CD - Build, Security Scan & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: CI - Build, Test & Security Analysis
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------------
      # 1. Checkout
      # ------------------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 2. Setup Java 17
      # ------------------------------------------------------------------
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # ------------------------------------------------------------------
      # 3. Maven Build, Unit Tests & JaCoCo Coverage
      # ------------------------------------------------------------------
      - name: Build and Test with JaCoCo Coverage
        run: mvn clean verify -B

      - name: Upload JaCoCo Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: |
            target/site/jacoco/
            target/jacoco.exec
          retention-days: 30

      # ------------------------------------------------------------------
      # 4. SpotBugs + FindSecBugs Static Analysis
      # ------------------------------------------------------------------
      - name: Run SpotBugs Analysis
        run: mvn spotbugs:check -B || true

      - name: Upload SpotBugs Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: spotbugs-report
          path: target/spotbugsXml.xml
          retention-days: 30

      # ------------------------------------------------------------------
      # 5. PMD Static Analysis
      # ------------------------------------------------------------------
      - name: Run PMD Analysis
        run: mvn pmd:check -B || true

      - name: Upload PMD Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pmd-report
          path: target/pmd.xml
          retention-days: 30

      # ------------------------------------------------------------------
      # 6. OWASP Dependency-Check
      # ------------------------------------------------------------------
      - name: Run OWASP Dependency-Check
        run: mvn org.owasp:dependency-check-maven:check -B -DfailBuildOnCVSS=11 || true

      - name: Upload OWASP Dependency-Check Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-dependency-check-report
          path: |
            target/dependency-check-report.html
            target/dependency-check-report.json
          retention-days: 30

      # ------------------------------------------------------------------
      # 7. Trivy Vulnerability Scan & SBOM
      # ------------------------------------------------------------------
      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          output: 'trivy-results.txt'
          severity: 'CRITICAL,HIGH,MEDIUM'

      - name: Generate Trivy SBOM
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'cyclonedx'
          output: 'trivy-sbom.json'

      - name: Upload Trivy Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-reports
          path: |
            trivy-results.txt
            trivy-sbom.json
          retention-days: 30

      # ------------------------------------------------------------------
      # 8. Gitleaks Secret Detection
      # ------------------------------------------------------------------
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        continue-on-error: true

      - name: Upload Gitleaks Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gitleaks-report
          path: results.sarif
          retention-days: 30

      # ------------------------------------------------------------------
      # 9. Upload JAR Artifact
      # ------------------------------------------------------------------
      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 30

  deploy:
    name: CD - Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      # ------------------------------------------------------------------
      # 1. Checkout
      # ------------------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 2. Setup Java 17
      # ------------------------------------------------------------------
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # ------------------------------------------------------------------
      # 3. Build JAR
      # ------------------------------------------------------------------
      - name: Build production JAR
        run: mvn clean package -B -DskipTests

      # ------------------------------------------------------------------
      # 4. Deploy to EC2
      # ------------------------------------------------------------------
      - name: Setup SSH key
        run: |
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > deploy_key.pem
          chmod 600 deploy_key.pem

      - name: Copy JAR to EC2
        run: |
          scp -i deploy_key.pem -o StrictHostKeyChecking=no \
            target/*.jar \
            ec2-user@${{ secrets.EC2_HOST }}:/opt/finance-tracker/app.jar

      - name: Restart application on EC2
        run: |
          ssh -i deploy_key.pem -o StrictHostKeyChecking=no \
            ec2-user@${{ secrets.EC2_HOST }} \
            'sudo systemctl restart finance-tracker && sleep 5 && sudo systemctl status finance-tracker'

      # ------------------------------------------------------------------
      # 5. Health Check
      # ------------------------------------------------------------------
      - name: Verify deployment
        run: |
          sleep 15
          curl -f http://${{ secrets.EC2_HOST }}:8080/v3/api-docs || echo "Health check - API docs endpoint may not be immediately available"

      # ------------------------------------------------------------------
      # Cleanup
      # ------------------------------------------------------------------
      - name: Cleanup SSH key
        if: always()
        run: rm -f deploy_key.pem
