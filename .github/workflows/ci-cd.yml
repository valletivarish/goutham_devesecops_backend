name: Personal Finance Tracker CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ==================== CONTINUOUS INTEGRATION ====================

  backend-ci:
    name: Backend CI - Build, Test & Security Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and Test with Maven
        run: cd backend && mvn clean verify -B
        # This runs: compile, test (JaCoCo), SpotBugs, PMD

      - name: OWASP Dependency Check
        run: cd backend && mvn dependency-check:check -B
        continue-on-error: true

      - name: Upload SpotBugs Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: spotbugs-report
          path: backend/target/spotbugsXml.xml

      - name: Upload PMD Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pmd-report
          path: backend/target/pmd.xml

      - name: Upload OWASP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-dependency-check-report
          path: backend/target/dependency-check-report.html

      - name: Upload JaCoCo Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: backend/target/site/jacoco/

  frontend-ci:
    name: Frontend CI - Build, Lint & Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: cd frontend && npm ci

      - name: ESLint Static Analysis
        run: cd frontend && npm run lint
        continue-on-error: true

      - name: Build Frontend
        run: cd frontend && npm run build

      - name: npm Audit Security Scan
        run: cd frontend && npm audit --audit-level=moderate
        continue-on-error: true

  # ==================== CONTINUOUS DEPLOYMENT ====================

  deploy-backend:
    name: CD - Deploy Backend to EC2
    needs: [backend-ci]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build JAR
        run: cd backend && mvn clean package -DskipTests -B

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo systemctl stop finance-tracker || true
            cd /opt/finance-tracker
            sudo cp backup.jar backup-prev.jar || true
            sudo cp app.jar backup.jar || true

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "backend/target/*.jar"
          target: "/opt/finance-tracker/"
          strip_components: 2

      - name: Start Application on EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/finance-tracker
            sudo mv *.jar app.jar
            sudo systemctl start finance-tracker
            sleep 10
            curl -f http://localhost:8080/actuator/health || echo "Health check failed"

  deploy-frontend:
    name: CD - Deploy Frontend to S3
    needs: [frontend-ci]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install and Build
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy to S3
        run: aws s3 sync frontend/dist/ s3://${{ secrets.S3_BUCKET_NAME }} --delete

      - name: Verify Deployment
        run: |
          curl -f http://${{ secrets.S3_BUCKET_NAME }}.s3-website-us-east-1.amazonaws.com || echo "Frontend deployment verification failed"
